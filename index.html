<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>🎵 EchoTune · discover songs you'll love</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(145deg, #0e1117 0%, #1a1e27 100%);
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
      margin: 0;
      color: #e8eaed;
    }

    .glass-card {
      background: rgba(20, 24, 33, 0.8);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-radius: 2.5rem;
      box-shadow: 0 25px 50px -8px rgba(0, 0, 0, 0.6), inset 0 0 0 1px rgba(255, 255, 255, 0.08);
      width: 100%;
      max-width: 650px;
      padding: 2.2rem 2rem;
      transition: all 0.3s ease;
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 600;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #c4b5fd, #7dd3fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .subtitle {
      color: #9ca3af;
      margin-bottom: 2rem;
      font-size: 1rem;
      border-left: 3px solid #7dd3fc;
      padding-left: 1rem;
      font-weight: 400;
    }

    .preference-panel {
      background: rgba(255, 255, 255, 0.04);
      border-radius: 1.5rem;
      padding: 1.5rem;
      margin-bottom: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .genre-section {
      margin-bottom: 1.8rem;
    }

    .label-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.7rem;
    }

    label {
      font-weight: 500;
      font-size: 0.95rem;
      color: #cbd5e1;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .optional-badge {
      background: rgba(125, 211, 252, 0.15);
      color: #7dd3fc;
      font-size: 0.7rem;
      padding: 0.25rem 0.8rem;
      border-radius: 2rem;
      font-weight: 500;
    }

    select, input {
      width: 100%;
      background: rgba(10, 12, 18, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 1rem;
      padding: 0.9rem 1.2rem;
      font-size: 1rem;
      color: #f1f5f9;
      outline: none;
      transition: all 0.2s;
      font-family: inherit;
      backdrop-filter: blur(4px);
      cursor: pointer;
    }

    select:hover, input:hover {
      border-color: rgba(125, 211, 252, 0.5);
    }

    select:focus, input:focus {
      border-color: #7dd3fc;
      box-shadow: 0 0 0 3px rgba(125, 211, 252, 0.2);
    }

    .mood-row {
      display: flex;
      gap: 0.8rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .mood-row input {
      flex: 2;
      min-width: 180px;
    }

    .discover-btn {
      background: linear-gradient(115deg, #1f2937, #111827);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: white;
      font-weight: 600;
      font-size: 1.1rem;
      padding: 1rem 2rem;
      border-radius: 2.5rem;
      width: 100%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      transition: all 0.25s;
      letter-spacing: 0.3px;
      background-size: 200% auto;
      margin-top: 0.5rem;
      backdrop-filter: blur(10px);
    }

    .discover-btn:hover:not(:disabled) {
      background-position: right center;
      border-color: #7dd3fc;
      box-shadow: 0 10px 20px -8px rgba(125, 211, 252, 0.3);
      transform: scale(1.01);
    }

    .discover-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      filter: grayscale(0.3);
    }

    .results-container {
      margin-top: 1.8rem;
    }

    .track-list {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      max-height: 400px;
      overflow-y: auto;
      padding-right: 0.3rem;
    }

    .track-item {
      background: rgba(255, 255, 255, 0.03);
      border-radius: 1.2rem;
      padding: 0.9rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      border: 1px solid rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(4px);
      transition: background 0.2s;
    }

    .track-item:hover {
      background: rgba(125, 211, 252, 0.08);
      border-color: rgba(125, 211, 252, 0.3);
    }

    .track-cover {
      width: 48px;
      height: 48px;
      border-radius: 10px;
      object-fit: cover;
      background: #2d3748;
      box-shadow: 0 6px 12px rgba(0,0,0,0.5);
    }

    .track-info {
      flex: 1;
    }

    .track-name {
      font-weight: 600;
      font-size: 1rem;
      color: #f1f5f9;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 250px;
    }

    .track-artist {
      font-size: 0.8rem;
      color: #94a3b8;
      margin-top: 0.15rem;
    }

    .preview-icon {
      background: rgba(255,255,255,0.08);
      border-radius: 50%;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #7dd3fc;
      cursor: pointer;
      transition: 0.2s;
      font-size: 1.2rem;
    }

    .preview-icon:hover {
      background: #7dd3fc;
      color: #0b0f17;
    }

    .empty-message {
      text-align: center;
      color: #6b7280;
      padding: 2rem;
      font-style: italic;
      background: rgba(255,255,255,0.02);
      border-radius: 1.5rem;
    }

    .error-message {
      color: #fca5a5;
      background: rgba(220, 38, 38, 0.15);
      padding: 0.8rem 1.2rem;
      border-radius: 1rem;
      font-size: 0.9rem;
    }

    .setup-note {
      background: rgba(125, 211, 252, 0.1);
      border: 1px solid rgba(125, 211, 252, 0.2);
      border-radius: 1rem;
      padding: 1rem;
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
      color: #bae6fd;
    }

    .powered-by {
      text-align: right;
      font-size: 0.7rem;
      margin-top: 1rem;
      color: #4b5563;
    }

    @media (max-width: 480px) {
      .glass-card {
        padding: 1.8rem 1.2rem;
      }
      .track-name {
        max-width: 180px;
      }
    }
  </style>
</head>
<body>
  <div class="glass-card">
    <h1>
      <span>🎧</span> EchoTune
    </h1>
    <div class="subtitle">songs shaped to your taste · no genre forced</div>

    <!-- IMPORTANT: Replace with your own Spotify credentials -->
    <div class="setup-note" id="setupNote" style="display: none;">
      ⚠️ <strong>Setup Required:</strong> Replace <code>CLIENT_ID</code> and <code>CLIENT_SECRET</code> 
      in the JavaScript with your own from 
      <a href="https://developer.spotify.com/dashboard" target="_blank" style="color: #7dd3fc;">Spotify Dashboard</a>
    </div>

    <div class="preference-panel">
      <div class="genre-section">
        <div class="label-row">
          <label>🎭 Genre vibe</label>
          <span class="optional-badge">optional</span>
        </div>
        <select id="genreSelect">
          <option value="">✨ I'm open to anything (skip genre)</option>
          <option value="pop">Pop</option>
          <option value="rock">Rock</option>
          <option value="hip-hop">Hip-Hop</option>
          <option value="electronic">Electronic</option>
          <option value="r-n-b">R&B</option>
          <option value="indie">Indie</option>
          <option value="jazz">Jazz</option>
          <option value="latin">Latin</option>
          <option value="k-pop">K-Pop</option>
          <option value="afrobeat">Afrobeat</option>
        </select>
      </div>

      <div class="label-row" style="margin-bottom: 0.5rem;">
        <label>🌦️ Mood / keyword</label>
        <span class="optional-badge">optional</span>
      </div>
      <div class="mood-row">
        <input type="text" id="moodInput" placeholder="e.g. chill, energetic, rainy day..." autocomplete="off">
      </div>
    </div>

    <button id="discoverBtn" class="discover-btn">
      <span>🔍</span> Discover new songs
    </button>

    <div id="resultsContainer" class="results-container">
      <div id="trackList" class="track-list">
        <div class="empty-message">✨ Your recommendations will appear here</div>
      </div>
    </div>
    <div class="powered-by">using Spotify Web API · real previews</div>
  </div>

  <script>
    (function() {
      // =============================================
      // IMPORTANT: Replace these with your own credentials
      // from https://developer.spotify.com/dashboard
      // =============================================
      const CLIENT_ID = "f12eb86baf224b58899ad8661585eeb5";  // ← Replace this
      const CLIENT_SECRET = "4f58c595e2af4066afc7186396daa8b5";  // ← Replace this
      
      // Check if credentials are still the placeholder
      const isPlaceholder = CLIENT_ID === "f12eb86baf224b58899ad8661585eeb5" || 
                           CLIENT_SECRET === "4f58c595e2af4066afc7186396daa8b5";
      
      if (isPlaceholder) {
        document.getElementById('setupNote').style.display = 'block';
      }
      
      let accessToken = null;
      let tokenExpiry = 0;

      const genreSelect = document.getElementById('genreSelect');
      const moodInput = document.getElementById('moodInput');
      const discoverBtn = document.getElementById('discoverBtn');
      const trackListDiv = document.getElementById('trackList');

      // ---------- Get Spotify Access Token ----------
      async function getAccessToken() {
        if (accessToken && Date.now() < tokenExpiry) {
          return accessToken;
        }

        if (isPlaceholder) {
          throw new Error('Please add your Spotify Client ID and Client Secret first!');
        }

        try {
          const response = await fetch('https://accounts.spotify.com/api/token', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/x-www-form-urlencoded',
              'Authorization': 'Basic ' + btoa(CLIENT_ID + ':' + CLIENT_SECRET)
            },
            body: 'grant_type=client_credentials'
          });

          if (!response.ok) {
            const errorData = await response.json().catch(() => ({}));
            console.error('Token error details:', errorData);
            throw new Error(`Authentication failed (${response.status}). Check your credentials.`);
          }

          const data = await response.json();
          accessToken = data.access_token;
          tokenExpiry = Date.now() + (data.expires_in - 60) * 1000;
          return accessToken;
        } catch (error) {
          console.error('Auth error:', error);
          throw error;
        }
      }

      // ---------- Build search query ----------
      function buildSearchQuery(genre, mood) {
        let queryParts = [];
        
        if (genre && genre.trim() !== '') {
          queryParts.push(`genre:${genre.trim()}`);
        }
        
        if (mood && mood.trim() !== '') {
          queryParts.push(mood.trim());
        }
        
        if (queryParts.length === 0) {
          queryParts.push('new');
        }
        
        return queryParts.join(' ');
      }

      // ---------- Fetch tracks ----------
      async function discoverTracks(genre, mood) {
        const token = await getAccessToken();
        const query = buildSearchQuery(genre, mood);
        
        const searchParams = new URLSearchParams({
          q: query,
          type: 'track',
          limit: 10,
          market: 'US'
        });

        const response = await fetch(`https://api.spotify.com/v1/search?${searchParams.toString()}`, {
          method: 'GET',
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
          }
        });

        if (!response.ok) {
          const errorBody = await response.text();
          console.error('Search error:', errorBody);
          throw new Error(`Spotify search failed (${response.status}). Try different keywords.`);
        }

        const data = await response.json();
        return data.tracks?.items || [];
      }

      // ---------- Render tracks ----------
      function renderTracks(tracks) {
        trackListDiv.innerHTML = '';
        
        if (!tracks || tracks.length === 0) {
          trackListDiv.innerHTML = `<div class="empty-message">🎶 No tracks found. Try a different mood or leave genre open.</div>`;
          return;
        }

        tracks.forEach(track => {
          const albumImage = track.album?.images?.[0]?.url || 
                            track.album?.images?.[1]?.url || 
                            'https://via.placeholder.com/48/2d3748/7dd3fc?text=🎵';
          
          const artistNames = track.artists?.map(artist => artist.name).join(', ') || 'Unknown artist';
          const trackName = track.name || 'Untitled';
          const previewUrl = track.preview_url;
          
          const trackItem = document.createElement('div');
          trackItem.className = 'track-item';
          
          trackItem.innerHTML = `
            <img src="${albumImage}" alt="${trackName}" class="track-cover" loading="lazy">
            <div class="track-info">
              <div class="track-name" title="${trackName}">${trackName}</div>
              <div class="track-artist">${artistNames}</div>
            </div>
            <div class="preview-icon" title="${previewUrl ? 'Play 30s preview' : 'No preview available'}" data-preview="${previewUrl || ''}">
              ${previewUrl ? '▶️' : '🔇'}
            </div>
          `;
          
          const previewIcon = trackItem.querySelector('.preview-icon');
          if (previewUrl) {
            previewIcon.addEventListener('click', (e) => {
              e.stopPropagation();
              playPreview(previewUrl, previewIcon);
            });
          } else {
            previewIcon.style.opacity = '0.5';
            previewIcon.style.cursor = 'default';
          }
          
          trackListDiv.appendChild(trackItem);
        });
      }

      let currentAudio = null;
      function playPreview(url, element) {
        if (currentAudio) {
          currentAudio.pause();
          currentAudio = null;
          document.querySelectorAll('.preview-icon').forEach(icon => {
            if (icon.dataset.preview) icon.textContent = '▶️';
          });
        }
        
        if (!url) return;
        
        const audio = new Audio(url);
        currentAudio = audio;
        element.textContent = '⏸️';
        
        audio.play().catch(err => {
          console.warn('Preview playback failed:', err);
          element.textContent = '▶️';
        });
        
        audio.addEventListener('ended', () => {
          element.textContent = '▶️';
          currentAudio = null;
        });
        
        audio.addEventListener('error', () => {
          element.textContent = '▶️';
          currentAudio = null;
        });
      }

      // ---------- Discover button handler ----------
      async function onDiscover() {
        discoverBtn.disabled = true;
        discoverBtn.innerHTML = `<span>⏳</span> Finding songs...`;
        
        try {
          const genre = genreSelect.value;
          const mood = moodInput.value.trim();
          const tracks = await discoverTracks(genre, mood);
          renderTracks(tracks);
        } catch (error) {
          console.error(error);
          trackListDiv.innerHTML = `<div class="error-message">⚠️ ${error.message || 'Could not load songs. Please try again.'}</div>`;
        } finally {
          discoverBtn.disabled = false;
          discoverBtn.innerHTML = `<span>🔍</span> Discover new songs`;
        }
      }

      discoverBtn.addEventListener('click', onDiscover);
      
      moodInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          onDiscover();
        }
      });

      window.addEventListener('beforeunload', () => {
        if (currentAudio) {
          currentAudio.pause();
          currentAudio = null;
        }
      });

    })();
  </script>
</body>
</html>
